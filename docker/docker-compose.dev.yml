version: "3.8"
services:
  web:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - data:/data
      - ..:/app
    ports:
      - 3000:3000
    env_file:
      - .env  # Automatically load all variables from this file
    command:
      - pnpm
      - web
    working_dir: /app
    depends_on:
      prep:
        condition: service_completed_successfully
  chrome:
    image: karakeep/chrome-desktop:${KARAKEEP_CHROME_TAG:-local}
    build:
      context: ./chrome-desktop
      args:
        UBUNTU_APT_MIRROR: ${UBUNTU_APT_MIRROR:-http://mirrors.aliyun.com/ubuntu/}
    restart: unless-stopped
    shm_size: 1gb
    cap_add:
      - SYS_ADMIN
    ports:
      - 9222:9222
      - 6080:6080
    environment:
      CHROME_REMOTE_DEBUGGING_PORT: 9222
      CHROME_PROXY_SERVER: ${CHROME_PROXY_SERVER:-}
      CHROME_PROXY_BYPASS_LIST: ${CHROME_PROXY_BYPASS_LIST:-}
      CHROME_PROXY_PAC_URL: ${CHROME_PROXY_PAC_URL:-}
      CHROME_DISABLE_SANDBOX: ${CHROME_DISABLE_SANDBOX:-false}
  meilisearch:
    image: getmeili/meilisearch:v1.37.0
    volumes:
      - meilisearch:/meili_data
  workers:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - data:/data
      - ..:/app
    env_file:
      - .env
    working_dir: /app
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      DATA_DIR: /data
      # OPENAI_API_KEY: ...
    command:
      - pnpm
      - workers
    depends_on:
      prep:
        condition: service_completed_successfully
  prep:
    build:
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    working_dir: /app
    environment:
      DATA_DIR: /data
    volumes:
      - data:/data
      - ..:/app
    command:
     - /bin/sh
     - -c
     - "pnpm install --frozen-lockfile && pnpm run db:migrate"

volumes:
  meilisearch:
  data:




