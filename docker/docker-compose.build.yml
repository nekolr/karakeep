services:
  web:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: aio
    restart: unless-stopped
    volumes:
      - data:/data
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      DATA_DIR: /data
  chrome:
    image: karakeep/chrome-desktop:${KARAKEEP_CHROME_TAG:-local}
    build:
      context: ./chrome-desktop
      args:
        UBUNTU_APT_MIRROR: ${UBUNTU_APT_MIRROR:-http://mirrors.aliyun.com/ubuntu/}
    restart: unless-stopped
    shm_size: 1gb
    cap_add:
      - SYS_ADMIN
    environment:
      CHROME_REMOTE_DEBUGGING_PORT: 9222
      CHROME_PROXY_SERVER: ${CHROME_PROXY_SERVER:-}
      CHROME_PROXY_BYPASS_LIST: ${CHROME_PROXY_BYPASS_LIST:-}
      CHROME_PROXY_PAC_URL: ${CHROME_PROXY_PAC_URL:-}
      CHROME_DISABLE_SANDBOX: ${CHROME_DISABLE_SANDBOX:-false}
  meilisearch:
    image: getmeili/meilisearch:v1.37.0
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch:/meili_data

volumes:
  meilisearch:
  data:




